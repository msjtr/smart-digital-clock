<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الساعة الرقمية الذكية - جامعة حائل</title>
    
    <meta name="description" content="نظام الساعة الرقمية الذكية لكلية الشريعة والقانون بجامعة حائل">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>

<body data-theme="dark">

    <aside id="sidebar" role="navigation" aria-label="القائمة الجانبية">
        <div class="sidebar-header">
            <h2>القائمة الرئيسية</h2>
        </div>
        <ul>
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">الرسائل</a></li>
            <li><a href="#">المناسبات</a></li>
            </ul>
    </aside>

    <header>
        <div class="logo-section">
            <img id="universityLogo" src="assets/images/logos/university-logo.png" alt="شعار جامعة حائل">
            <img id="collegeLogo" src="assets/images/logos/college-logo.png" alt="شعار كلية الشريعة والقانون">
            <div>
                <h1>الساعة الرقمية الذكية</h1>
                <p>جامعة حائل - كلية الشريعة والقانون</p>
            </div>
        </div>
        <div class="status-box" aria-live="polite">
            <span id="connectionStatus">متصل</span>
        </div>
    </header>

    <main>
        <section id="occasionBox" class="widget fade-in">
            <h2>🎉 المناسبة الحالية</h2>
            <p>أهلاً بكم في كلية الشريعة والقانون</p>
        </section>

        <section id="clockSection" class="widget">
            <div id="clock" aria-live="off">00:00:00</div>
        </section>

        </main>

    <footer id="newsTicker">
        <div class="ticker-content">
            أهلاً بكم في نظام الساعة الرقمية الذكية - جامعة حائل - كلية الشريعة والقانون
        </div>
    </footer>

    <script type="module" src="assets/js/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js")
                    .catch(err => console.error("Service Worker Error:", err));
            });
        }
    </script>
</body>
</html>
