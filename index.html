<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشاشة الرقمية الذكية - جامعة حائل</title>
    
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <style>
        /* نظام العرض المتسلسل (Slider) */
        .widget-container { 
            position: relative; 
            width: 100%; 
            min-height: 500px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .widget { 
            display: none; 
            width: 100%; 
            text-align: center; 
            animation: fadeIn 1s;
        }
        .widget.active { display: block; }
        
        .admin-login-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body data-theme="dark">

    <header>
        <div class="logo-section">
            <img src="assets/images/logos/university-logo.jpg" alt="جامعة حائل">
            <img src="assets/images/logos/college-logo.jpg" alt="الكلية">
            <div>
                <h1>الساعة الرقمية الذكية</h1>
                <p>جامعة حائل - كلية الشريعة والقانون</p>
            </div>
        </div>
        <a href="admin.html" class="admin-login-btn">الإدارة 🔒</a>
    </header>

    <main class="widget-container">
        <section class="widget active"><h2>المناسبات</h2><div id="occasionBox"></div></section>
        <section class="widget"><h2>الوقت</h2><div id="clock">--:--:--</div></section>
        <section class="widget"><h2>التاريخ</h2><div id="dateSection"></div></section>
        <section class="widget"><h2>الطقس</h2><div id="weatherInfo">جاري التحديث...</div></section>
        <section class="widget"><h2>الصلاة</h2><div id="prayerTimes">جاري التحديث...</div></section>
        <section class="widget"><h2>الرسائل</h2><div id="messageDisplay">أهلاً بكم...</div></section>
        <section class="widget"><h2>العد التنازلي</h2><div id="countdown">--:--:--</div></section>
        <section class="widget"><h2>المحتوى</h2><div id="contentArea">لا يوجد محتوى حالياً</div></section>
    </main>

    <footer id="newsTicker">
        <div class="ticker-content">جامعة حائل - كلية الشريعة والقانون</div>
    </footer>

    <script type="module">
        // نظام التبديل التلقائي
        document.addEventListener("DOMContentLoaded", () => {
            const widgets = document.querySelectorAll('.widget');
            let index = 0;
            
            setInterval(() => {
                widgets[index].classList.remove('active');
                index = (index + 1) % widgets.length;
                widgets[index].classList.add('active');
            }, 5000); // 5 ثواني
        });
    </script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
