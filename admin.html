<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - الشاشة الرقمية الذكية</title>
    
    <link rel="icon" href="assets/images/icons/icon-192x192.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body data-theme="dark">

    <div id="loginScreen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a;">
        <div style="background: #1e293b; padding: 40px; border-radius: 10px; text-align: center; width: 350px;">
            <h2 style="color: #f8fafc; margin-bottom: 30px;">تسجيل الدخول للإدارة</h2>
            <input type="text" id="adminUsername" placeholder="اسم المستخدم" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; background: #0f172a; color: #fff; border: 1px solid #334155; text-align: center;">
            <input type="password" id="adminPassword" placeholder="كلمة المرور" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; background: #0f172a; color: #fff; border: 1px solid #334155; text-align: center;">
            <button id="loginBtn" class="btn-primary" style="width: 100%; padding: 12px;">دخول</button>
        </div>
    </div>

    <div id="adminDashboard" style="display: none;">
        <aside class="admin-sidebar">
            <div style="text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px;">
                <h3 style="color: #14b8a6; margin: 0;">الشاشة الذكية</h3>
                <small style="color: #94a3b8;">كلية الشريعة والقانون</small>
            </div>
            
            <ul class="sidebar-menu">
                <li data-tab="mainDashboard" class="active">📊 الإحصائيات</li>
                <li data-tab="messagesSettings" data-permission="manage_messages">💬 الرسائل</li>
                <li data-tab="newsSettings" data-permission="manage_news">📰 الشريط الإخباري</li> <li data-tab="occasionsSettings" data-permission="manage_occasions">🎉 المناسبات</li>
            </ul>
            
            <button id="logoutBtn" style="margin-top: 20px; width: 100%; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s;">تسجيل الخروج</button>
        </aside>

        <main class="admin-content">
            <div id="mainDashboard" class="tab-pane active"></div>
            <div id="messagesSettings" class="tab-pane"></div>
            <div id="occasionsSettings" class="tab-pane"></div>
            
            <div id="newsSettings" class="tab-pane">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #f8fafc; margin: 0;">إدارة الشريط الإخباري</h2>
                    <button onclick="document.getElementById('addNewsModal').style.display='flex'" style="background: #14b8a6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">+ إضافة خبر جديد</button>
                </div>

                <div style="background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid #334155;">
                    <table style="width: 100%; border-collapse: collapse; text-align: right; color: #f8fafc;">
                        <thead style="background: #0f172a; border-bottom: 2px solid #334155;">
                            <tr>
                                <th style="padding: 15px; width: 50px;">الترتيب</th>
                                <th style="padding: 15px;">نص الخبر</th>
                                <th style="padding: 15px; width: 100px;">الحالة</th>
                                <th style="padding: 15px; width: 150px;">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="adminNewsTableBody">
                            </tbody>
                    </table>
                </div>

                <div id="addNewsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
                    <div style="background: #1e293b; padding: 30px; border-radius: 15px; width: 500px; border: 1px solid #334155;">
                        <h3 style="color: #14b8a6; margin-top: 0; margin-bottom: 20px;">إضافة خبر عاجل جديد</h3>
                        <textarea id="newNewsText" rows="4" placeholder="اكتب نص الخبر هنا..." style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; background: #0f172a; color: #fff; border: 1px solid #334155; resize: vertical; font-family: inherit; font-size: 1rem;"></textarea>
                        
                        <div style="display: flex; gap: 10px; justify-content: flex-end;">
                            <button onclick="document.getElementById('addNewsModal').style.display='none'" style="background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">إلغاء</button>
                            <button onclick="const txt = document.getElementById('newNewsText').value; if(txt) { addNewItem(txt); document.getElementById('newNewsText').value=''; document.getElementById('addNewsModal').style.display='none'; }" style="background: #14b8a6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">حفظ ونشر</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
